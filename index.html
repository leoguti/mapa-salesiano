<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa del Salesiano - Nuestros Lugares Favoritos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; }
        #header {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            color: white;
            padding: 15px 25px;
            text-align: center;
        }
        #header h1 { font-size: 1.4em; margin-bottom: 5px; }
        #header p { font-size: 0.9em; opacity: 0.8; }
        #map { height: calc(100vh - 80px); width: 100%; }
        .popup h3 { color: #1a237e; margin-bottom: 5px; }
        .popup p { color: #333; font-size: 0.9em; margin-bottom: 5px; }
        .popup .autor {
            display: inline-block;
            background: #e3f2fd;
            color: #1565c0;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Mapa del Salesiano - Nuestros Lugares Favoritos</h1>
        <p>Escuela OSM + Vibe Coding | Club Deportivo Salesiano 2026</p>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([5.8268, -73.0333], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> | Escuela OSM Salesiano 2026'
        }).addTo(map);

        // ============================================================
        // EJEMPLO - Copia este bloque y cambia los datos
        // ============================================================
        // L.marker([LATITUD, LONGITUD]).addTo(map)
        //     .bindPopup(
        //         '<div class="popup">' +
        //         '<h3>NOMBRE DEL LUGAR</h3>' +
        //         '<p>DESCRIPCIÓN: Por qué me gusta este lugar</p>' +
        //         '<span class="autor">Agregado por: TU NOMBRE</span>' +
        //         '</div>'
        //     );
        // ============================================================

        // === LEONARDO (ejemplo) ===
        L.marker([5.833130, -73.034693]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>Colegio Salesiano</h3>' +
                '<p>Nuestra base de operaciones. Aquí nació la Escuela de OpenStreetMap.</p>' +
                '<span class="autor">Agregado por: Leonardo</span>' +
                '</div>'
            );

        // === NADIA ===
                L.marker([5.833311, -73.034846]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>Colegio Salesiano</h3>' +
                '<p>DESCRIPCION:Es el unico lado al que salgo</p>' +
                '<span class="autor">Agregado por: Nadia</span>' +
                '</div>'
            );

        // === BRAYAN ===
                L.marker([5.833182,-73.034416]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>CANCHA DE VOLEYBOL COLEGIO SALESIANO</h3>' +
                '<p>DESCRIPCION: Me gusta este lugar ya que es el único que me aliviana el estrés académico.</p>' +
                '<span class="autor">Agregado por: EsneiderCastro</span>' +
                '</div>'
            );

        // === ANA MARIA ===
                L.marker([5.831174, -73.034266]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>Empanadas y Café</h3>' +
                '<p>DESCRIPCION: Un lugar con exquisitas empanadas para antojarse con su respectivo jugo.</p>' +
                '<span class="autor">Agregado por: Ana María</span>' +
                '</div>'
            );


        // === CRISTIAN ===
        L.marker([ 5.832441, -73.032220]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>INNOVO PLAZA</h3>' +
                '<p>DESCRIPCION:  sitio de compras mas cercano</p>' +
                '<span class="autor">Agregado por:  CristianTibaduiza</span>' +
                '</div>'
            );

        // === CAMILO PEÑA ===
        L.marker([5.819980,-73.040830]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>Mi casa </h3>' +
                '<p>DESCRIPCION:Me gusta porque es acogedor y grande y tranquilo y estan mi papi y mi mami y mi gato </p>' +
                '<span class="autor">Agregado por:JuanCamilo777Pro</span>' +
                '</div>'
            );

        // === YOSEF ===
         L.marker([5.834472, -73.031490]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>PARQUE DE LOS ENAMORADO</h3>' +
                '<p>DESCRIPCION: me parece muy bonito por que pasan cosas curiosas aya</p>' +
                '<span class="autor">Agregado por: yosef patiño</span>' +
                '</div>'
            ); 
        // === EDWARD ===
        L.marker([5.809021,-73.026037]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>Barrio sevilla 2</h3>' +
                '<p>DESCRIPCION: hay interacción y diversión para todas las edades </p>' +
                '<span class="autor">Agregado por: Edward Alejandro</span>' +
                '</div>'
            );

        // === STEFANIA ===
         L.marker([5.831774, -73.036417]).addTo(map)
            .bindPopup(
                '<div class="popup">' +
                '<h3>CASA DE STEFANIA</h3>' +
                '<p>DESCRIPCION: porque estoy comoda,con mi familia y puedo comer cuando quiera</p>' +
                '<span class="autor">Agregado por: StefaniaAlvarez</span>' +
                '</div>'
                );
    </script>
</body>
</html>
